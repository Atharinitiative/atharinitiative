<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قريباً | مبادرة أثر</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0d4633;
            --secondary-color: #2e8b57;
            --light-bg: #f4f7f5;
            --white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body {
            background-color: var(--light-bg);
            color: #2d3748;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        .card {
            background: var(--white);
            padding: 50px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(13, 70, 51, 0.08);
            max-width: 500px;
            width: 100%;
        }
        .card i { font-size: 4rem; color: var(--secondary-color); margin-bottom: 20px; }
        .card h1 { color: var(--primary-color); font-size: 2rem; margin-bottom: 15px; font-weight: 800; }
        .card p { color: #555; font-size: 1.1rem; margin-bottom: 30px; }
        .btn-back {
            display: inline-block;
            background-color: var(--primary-color);
            color: var(--white);
            padding: 12px 35px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-back:hover { background-color: var(--secondary-color); transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card">
        <i class="fa-solid fa-hourglass-half fa-spin"></i>
        <h1>قريباً جداً!</h1>
        <p>نعمل حالياً على تجهيز وإطلاق صفحة هذا النشاط بكافة تفاصيلها لتكون متاحة لكم في أقرب وقت.</p>
        <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-right"></i> العودة للرئيسية</a>
    </div>
</body>
</html>
